<!DOCTYPE html>
    <html lang="en">
        <head>
            <title>Music Player</title>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">  
            <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
            <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
            <link rel="stylesheet" href="CSS/style.css">
        </head>

        <body>
                
                <!-- Side Nav -->

                    <aside id="sidebar" class="sidebar">

                        <button id="toggleBtn" class="toggle-btn">
                            <i class="bi bi-list"></i>
                        </button>

                        <ul class="nav flex-column mt-2">
                            <li class="nav-item">
                                <a href="#" class="nav-link active">
                                    <i class="bi bi-house"></i>
                                    <span class="link-text">Home</span>
                                </a>
                            </li>
                            <li class="nav-item">
                                <a href="#" class="nav-link">
                                    <i class="bi bi-compass"></i>
                                    <span class="link-text">Explore</span>
                                </a>
                            </li><li class="nav-item">
                                <a href="#" class="nav-link">
                                    <i class="bi bi-bookmark"></i>
                                    <span class="link-text">Library</span>
                                </a>
                            </li>
                        </ul>

                        <hr class="sidebar-divider">

                    </aside>

                <!-- Top Nav -->
 
                <div class="layout">
                    <header class="top-nav">
                        <div class="top-left">
                            <span class="brand">StreaMusic</span>
                                    
                            <div class="search-wrapper">
                                <i class="bi bi-search"></i>
                                <input type="text" class="search-input" placeholder="What do you want to play?">
                            </div>
                        </div>
                       
                        <div class="account" id="accountBtn">
                            <i class="bi bi-person-circle"></i>

                                <div class="account-dropdown" id="accountDropdown">
                                    <div class="dropdown-header">
                                        <div class="avatar">
                                            <i class="bi bi-person-fill"></i>
                                        </div>
                                        <div class="user-info">
                                            <div class="#name">Name</div>
                                        </div>
                                    </div>
                                    
                                    <div class="dropdown-divider"></div>

                                        <a href="#">Profile</a>
                                        <a href="#">Settings</a>

                                    <hr class="dropdown-divider">

                                    <a href="#" class="logout">
                                        <i class="bi bi-box-arrow-right"></i>Logout
                                    </a>
                                </div>
                        </div>                    
                    </header>

                    <main class="main-content">
                        <h2>Good Evening</h2>

                        <div class="card-grid">
                            <div class="music-card">
                                <img src="https://via.placeholder.com/200" alt="">
                                <h5>Chill Playlist</h5>
                                <p>Relaxing beats</p>
                            </div>

                            <div class="music-card">
                                <img src="https://via.placeholder.com/200" alt="">
                                <h5>Top Hits</h5>
                                <p>Trending now</p>
                            </div>
                        </div>

                        <h3 class="customized">Made for you</h3>
                    </main>

                </div>

                <!--Music/Audio Player-->

                <div class="music-player">

                    <!-- Song Info -->
                    <div class="player-left">
                        <img src="https://via.placeholder.com/50" alt="cover" class="cover">
                        <div class="song-info">
                            <div class="song-title">Song Title</div>
                            <div class="song-artist">Artist Name</div>
                        </div>
                    </div>

                    <!-- Center Controls -->
                    <div class="player-center">
                        <div class="controls">
                            <i class="bi bi-shuffle"></i>
                            <i class="bi bi-skip-backward-fill"></i>
                            <button class="play-btn">
                                <i class="bi bi-play-fill"></i>
                            </button>
                            <i class="bi bi-skip-forward-fill"></i>
                            <i class="bi bi-repeat"></i>
                        </div>

                        <div class="progress-container">
                            <span class="time">0:00</span>
                            <input type="range" class="progress-bar" value="30">
                            <span class="time">3:45</span>
                        </div>
                    </div>

                    <!-- Volume -->
                     <div class="player-right">
                        <i class="bi bi-volume-up"></i>
                        <input type="range" class="volume-bar" value="70">
                     </div>
                </div>

            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
            <script src="JS/script.js"></script>
        </body>
    </html>
